# Builds and releases Wezmux.app bundle on version tags (v*)
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            arch: arm64
          - target: x86_64-apple-darwin
            runner: macos-13
            arch: x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p wezterm-gui -p wezterm -p wezterm-mux-server -p strip-ansi-escapes

      - name: Assemble app bundle
        run: |
          mkdir -p Wezmux.app/Contents/MacOS Wezmux.app/Contents/Resources
          cp target/${{ matrix.target }}/release/wezterm-gui Wezmux.app/Contents/MacOS/
          cp target/${{ matrix.target }}/release/wezterm Wezmux.app/Contents/MacOS/
          cp target/${{ matrix.target }}/release/wezterm-mux-server Wezmux.app/Contents/MacOS/
          cp target/${{ matrix.target }}/release/strip-ansi-escapes Wezmux.app/Contents/MacOS/
          cp assets/macos/WezTerm.app/Contents/Info.plist Wezmux.app/Contents/
          cp assets/macos/WezTerm.app/Contents/Resources/terminal.icns Wezmux.app/Contents/Resources/
          cp -R bin Wezmux.app/Contents/Resources/bin
          ln -s ../Resources/bin Wezmux.app/Contents/MacOS/bin
          chmod +x Wezmux.app/Contents/Resources/bin/claude Wezmux.app/Contents/Resources/bin/hooks/*.sh Wezmux.app/Contents/Resources/bin/hooks/codex/*.sh Wezmux.app/Contents/Resources/bin/install-codex-hooks.sh
          codesign --force --sign - Wezmux.app/Contents/MacOS/wezterm-gui

      - name: Create zip archive
        run: ditto -c -k --keepParent Wezmux.app Wezmux-macos-${{ matrix.arch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wezmux-macos-${{ matrix.arch }}
          path: Wezmux-macos-${{ matrix.arch }}.zip

  build-windows:
    runs-on: windows-2022

    env:
      CARGO_INCREMENTAL: "0"
      RUSTUP_WINDOWS_PATH_ADD_BIN: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        shell: pwsh
        run: |
          $env:PATH = "C:\Strawberry\perl\bin;$env:PATH"
          cargo build --release -p wezterm -p wezterm-gui -p wezterm-mux-server -p strip-ansi-escapes

      - name: Package zip
        shell: pwsh
        run: ./ci/package-windows.ps1 -ZipName Wezmux-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wezmux-windows-x64
          path: Wezmux-windows-x64.zip

  release:
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            Wezmux-macos-arm64/Wezmux-macos-arm64.zip
            Wezmux-macos-x86_64/Wezmux-macos-x86_64.zip
            Wezmux-windows-x64/Wezmux-windows-x64.zip
          generate_release_notes: true
